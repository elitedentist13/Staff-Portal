<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard</title>
  <style>
    body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
    .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; transition: background 0.3s; }
    .logout-btn:hover { background: #c82333; }
    
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      text-decoration: none;
      color: #333;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer; /* Added pointer cursor */
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
      background-color: #f8fbff;
    }
    .icon { font-size: 50px; margin-bottom: 15px; }
    .title { font-size: 18px; font-weight: bold; }

    /* New CSS for the Attendance Table */
    #attendanceSection { 
      display:none; 
      margin: 30px auto; 
      background: white; 
      padding: 20px; 
      border-radius: 8px; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
      max-width: 1200px; 
      overflow-x: auto; 
    }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background-color: #f8f9fa; }
  </style>
</head>
<body>

  <script>
    if (!sessionStorage.getItem('loggedInUser')) {
        window.location.href = 'index.html';
    }
    if (sessionStorage.getItem('loggedInUser') === "pt") {
  document.getElementById('attendanceCard').style.display = 'none';
}
  </script>

  <div class="header">
    <h2>Clinic Staff Portal</h2>
    <div>
      <span style="margin-right: 15px;">Welcome, <b><span id="userNameDisplay"></span></b></span>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
  </div>

  <div class="dashboard-grid">
    
    <a href="https://docs.google.com/document/d/1xbmdO0FgX2YAufESFwcM3qumFEOTGjFjKAWz61o8HZs/edit?usp=sharing" target="_blank" class="card">
      <div class="icon">📢</div>
      <div class="title">Latest News</div>
    </a>

    <a href="https://docs.google.com/spreadsheets/d/1ecTa-FvsUK4bRZHLwvpDRAlXeajeddT64TR7YOs8TGA/edit?usp=sharing" target="_blank" class="card">
      <div class="icon">🦷</div>
      <div class="title">Duty Roster</div>
    </a>

    <div id="attendanceCard" class="card" onclick="viewAttendance()">
      <div class="icon">🏖️</div>
      <div class="title">AL Leaves Record</div>
    </div>

    <a href="https://drive.google.com/drive/folders/1t4m-AwcP3rqOaHdEc9dLBBbUg5lRvVDg?usp=sharing" target="_blank" class="card">
      <div class="icon">📄</div>
      <div class="title">Useful Documents</div>
    </a>

    <a href="https://drive.google.com/drive/folders/1BKR4ly3HU08BvFmhxXOVAZKoHvEER-oL?usp=drive_link" target="_blank" class="card">
      <div class="icon">📁</div>
      <div class="title">Drive Storage</div>
    </a>

    <a href="https://drive.google.com/drive/folders/1fuOtyZuncrNPyRmcGosIoTIp3NSrrq1N?usp=drive_link" target="_blank" class="card">
      <div class="icon">🎓</div>
      <div class="title">Training</div>
    </a>

    <a href="https://www.joyfulsmiledental.com/" target="_blank" class="card">
      <div class="icon">🌟</div>
      <div class="title">Joyful Webpage</div>
    </a>

    <a href="https://docs.google.com/document/d/1ai9QwKAmzAU67x9jPDC1Cuw4Ukpn0VvU/edit?usp=sharing&ouid=116422061399833668611&rtpof=true&sd=true" target="_blank" class="card">
      <div class="icon">🎂</div>
      <div class="title">Birthdays</div>
    </a>

    <a href="https://drive.google.com/drive/folders/1uKWK_R6G7-Pz2abXGIIJOXjLP-QFL35B?usp=sharing" target="_blank" class="card">
      <div class="icon">📸</div>
      <div class="title">Clinic Life photos</div>
    </a>

    <a href="https://drive.google.com/drive/folders/1MEXWDyQqh7K9L8c_XqdtwFraXgJQIolm?usp=sharing" target="_blank" class="card">
      <div class="icon">🐱</div>
      <div class="title">Cat Photo & Video</div>
    </a>

  </div>

  <div id="attendanceSection">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h3>My Personal Attendance Record</h3>
      <button onclick="document.getElementById('attendanceSection').style.display='none'" style="cursor:pointer; padding:5px 10px;">Close</button>
    </div>
    <table id="attendanceTable"></table>
  </div>

  <script>
    // 1. MUST PUT YOUR SCRIPT URL HERE
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz0Z6iSZsJIfhLS8RIf_KugU7XI4hPCx7Ed6cW-WcMAtIoFKK9b00eNPM99mPAV9qs8wA/exec';

    document.getElementById('userNameDisplay').innerText = sessionStorage.getItem('loggedInUser');

    function viewAttendance() {
      const user = sessionStorage.getItem('loggedInUser');
      const table = document.getElementById('attendanceTable');
      const section = document.getElementById('attendanceSection');
      const url = "https://docs.google.com/spreadsheets/d/1PEzGcibBLWCCPhyezJK3ricOhCwy8q2Qxzw55rrjjyk/edit?usp=sharing";

  // Create a hidden link, set it to open in a new tab, and click it
  const link = document.createElement('a');
  link.href = url;
  link.target = '_blank';
  link.rel = 'noopener noreferrer'; // This prevents the new page from controlling the old one
  link.click();
      
      section.style.display = 'block';
      table.innerHTML = "<tr><td>Loading your records...</td></tr>";

      fetch(`${WEB_APP_URL}?action=getAttendance&username=${encodeURIComponent(user)}`)
        .then(res => res.json())
        .then(data => {
          if (data.length <= 1) {
            table.innerHTML = "<tr><td>No records found for your account.</td></tr>";
            return;
          }
          let html = "";
          data.forEach((row, i) => {
            html += "<tr>";
            row.forEach(cell => {
              const tag = i === 0 ? "th" : "td";
              html += `<${tag}>${cell}</${tag}>`;
            });
            html += "</tr>";
          });
          table.innerHTML = html;
        })
        .catch(err => {
          table.innerHTML = "<tr><td style='color:red;'>Error loading data. Check script deployment settings.</td></tr>";
        });
    }
  
    function logout() {
      sessionStorage.removeItem('loggedInUser');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
