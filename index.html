<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinic Staff Login</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
    .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
    input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 15px; transition: background 0.3s; }
    button:hover { background-color: #004494; }
    #message { color: red; margin-top: 15px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Staff Portal Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="loginBtn">Log In</button>
    </form>
    <p id="message"></p>
  </div>

  <script>
    // REPLACE THIS with your Apps Script Web App URL
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz0Z6iSZsJIfhLS8RIf_KugU7XI4hPCx7Ed6cW-WcMAtIoFKK9b00eNPM99mPAV9qs8wA/exec';

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const msgBox = document.getElementById('message');
      const btn = document.getElementById('loginBtn');
      
      btn.innerText = "Verifying...";
      msgBox.innerText = "";

      fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ 
          'action': 'login', 
          'username': user, 
          'password': pass 
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          // Save login state and redirect
          sessionStorage.setItem('loggedInUser', user);
          window.location.href = 'portal.html'; 
        } else {
          msgBox.innerText = "Incorrect username or password.";
          btn.innerText = "Log In";
        }
      })
      .catch(error => {
        msgBox.innerText = "Error connecting to server. Please try again.";
        btn.innerText = "Log In";
      });
    });
  </script>
</body>
</html>
